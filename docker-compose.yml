services:
  # 1. Banco de Dados (PostgreSQL + TimescaleDB para IoT)
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: smarthome_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Broker MQTT (O mensageiro dos dispositivos de hardware)
  mqtt_broker:
    image: eclipse-mosquitto:latest
    container_name: smarthome_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883" # Porta padrão MQTT para os aparelhos
      - "9001:9001" # Porta WebSockets
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

# Garantindo que os dados não sumam se o PC reiniciar
volumes:
  pgdata:
  mosquitto_data:
  mosquitto_log:
